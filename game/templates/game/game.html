{% extends "game/base.html" %}
{% block title %}So Clover – Game{% endblock %}

{% block content %}
<div id="app">
  <div class="top-bar">
    <div>
      <div class="room-code" id="roomCode"></div>
      <div class="player-name" id="playerName"></div>
    </div>
    <div class="phase-pill" id="phaseLabel">Waiting…</div>
  </div>

  <div class="game-layout">
    <div class="main-area" id="mainArea"></div>
    <div class="sidebar">
      <div class="sidebar-section">
        <h4>Players</h4>
        <div id="playerList"></div>
      </div>
      <div id="sidebarExtra"></div>
    </div>
  </div>
</div>

<style>
:root {
  --green: #4caf50;
  --green-light: #81c784;
  --green-dark: #388e3c;
  --red: #e53935;
  --card-bg: #fff;
  --card-border: #c8e6c9;
  --hint-bg: #f1f8e9;
  --hint-border: #a5d6a7;
  --shadow: 0 2px 8px rgba(0,0,0,.1);
}
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Segoe UI',system-ui,sans-serif; background:#f5f5f5; color:#333; }

/* ── Top bar ── */
.top-bar { display:flex; justify-content:space-between; align-items:center; padding:12px 20px; background:#fff; box-shadow:var(--shadow); }
.room-code { font-size:1.1rem; font-weight:800; color:var(--green); letter-spacing:2px; }
.player-name { font-size:.8rem; color:#888; }
.phase-pill { background:var(--green); color:#fff; font-size:.75rem; font-weight:700; padding:4px 12px; border-radius:12px; }

/* ── Layout ── */
.game-layout { display:flex; gap:20px; padding:20px; max-width:1100px; margin:0 auto; }
.main-area { flex:1; min-width:0; }
.sidebar { width:240px; flex-shrink:0; }
.sidebar-section { background:#fff; border-radius:12px; box-shadow:var(--shadow); padding:14px; margin-bottom:14px; }
.sidebar-section h4 { font-size:.85rem; color:#888; margin-bottom:8px; }

/* ── Player list ── */
.player-row { display:flex; align-items:center; gap:8px; padding:6px 0; border-bottom:1px solid #f0f0f0; font-size:.85rem; }
.player-row:last-child { border-bottom:none; }
.sp-dot { width:10px;height:10px;border-radius:50%;background:#ccc;flex-shrink:0; }
.sp-dot.done { background:var(--green-light); }
.sp-score { margin-left:auto; font-weight:700; color:var(--green); font-size:.85rem; }

/* ── Board ── */
.board-wrapper {
  position: relative;
  width: 100%;
  max-width: 420px;
  margin: 0 auto;
}
.board-grid {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  grid-template-rows: 1fr auto 1fr;
  gap: 0;
  width: 100%;
  aspect-ratio: 1;
  background: var(--green);
  border-radius: 12px;
  padding: 6px;
}
.board-cell { display:flex; align-items:center; justify-content:center; }

/* Card — square with 4 edge words */
.board-card {
  background: var(--card-bg);
  border: 2px solid var(--card-border);
  border-radius: 6px;
  width: 92%;
  height: 92%;
  display: grid;
  grid-template-rows: auto 1fr auto;
  grid-template-columns: auto 1fr auto;
  position: relative;
}
.board-card .cw { 
  font-size: .6rem; font-weight: 700; text-transform: uppercase; 
  letter-spacing: .3px; text-align: center; padding: 3px 4px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  max-width: 80px;
}
.board-card .cw-n { grid-column: 2; grid-row: 1; }
.board-card .cw-s { grid-column: 2; grid-row: 3; }
.board-card .cw-w { grid-column: 1; grid-row: 2; justify-self: center; }
.board-card .cw-e { grid-column: 3; grid-row: 2; justify-self: center; }
.board-card .cw-center {
  grid-column: 2; grid-row: 2;
  display: flex; align-items: center; justify-content: center;
}
.board-card .cw-center-dot {
  width: 12px; height: 12px; border-radius: 50%; background: var(--green);
  opacity: 0.3;
}

/* Card clickable states */
.board-card.clickable { cursor: pointer; transition: transform .15s, border-color .15s; }
.board-card.clickable:hover { transform: scale(1.03); border-color: var(--green-light); }
.board-card.selected { border-color: var(--green); box-shadow: 0 0 0 3px rgba(76,175,80,.3); }
.board-card.has-card { cursor: default; }
.board-card.has-card:hover { transform: none; }

/* Clue zone — at edges between cards */
.clue-zone {
  background: var(--hint-bg);
  border: 2px solid var(--hint-border);
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  padding: 4px;
  width: 80%;
  height: 70%;
}
.clue-zone input {
  width: 100%; border: none; background: transparent; text-align: center;
  font-weight: 700; font-size: .75rem; text-transform: uppercase; outline: none; color: #333;
}
.clue-zone input::placeholder { font-weight: 400; text-transform: none; color: #bbb; font-size: .65rem; }
.clue-zone .clue-words { font-size: .55rem; color: #888; text-align: center; line-height: 1.2; }
.clue-zone .clue-display { font-weight: 800; font-size: .8rem; text-transform: uppercase; color: var(--green); letter-spacing: .5px; }

/* Center of board */
.board-center {
  display: flex; align-items: center; justify-content: center;
}
.board-center-dot { width: 20px; height: 20px; border-radius: 50%; background: var(--green); opacity: .4; }

/* Drop target */
.drop-target { border-color: var(--green-light) !important; background: #f1f8e9 !important; border-style: dashed !important; }
.drop-target .cw { opacity: .4; }

/* Card controls */
.card-controls { position: absolute; top: 2px; right: 4px; display: flex; gap: 2px; z-index: 2; }
.card-btn {
  font-size: .55rem; cursor: pointer; color: #aaa; background: none; border: none; line-height: 1;
}
.card-btn:hover { color: var(--red); }
.card-btn.flip { color: var(--green); border: 1px solid var(--green); border-radius: 3px; padding: 0 3px; }

/* ── Card pool ── */
.card-pool {
  display: flex; flex-wrap: wrap; gap: 10px; margin: 16px 0; justify-content: center;
}
.pool-card {
  background: var(--card-bg); border: 2px solid var(--card-border); border-radius: 8px;
  padding: 8px 12px; cursor: pointer; transition: all .15s; text-align: center; min-width: 80px;
  display: grid; grid-template-rows: auto 1fr auto; grid-template-columns: auto 1fr auto;
  width: 90px; height: 80px;
}
.pool-card:hover { transform: scale(1.05); border-color: var(--green-light); }
.pool-card.selected { border-color: var(--green); background: #f1f8e9; box-shadow: 0 0 0 3px rgba(76,175,80,.2); }
.pool-card.placed { opacity: .35; cursor: default; transform: none; }
.pool-card .pw {
  font-size: .55rem; font-weight: 700; text-transform: uppercase; letter-spacing: .3px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: center;
}
.pool-card .pw-n { grid-column: 2; grid-row: 1; }
.pool-card .pw-s { grid-column: 2; grid-row: 3; }
.pool-card .pw-w { grid-column: 1; grid-row: 2; align-self: center; }
.pool-card .pw-e { grid-column: 3; grid-row: 2; align-self: center; }
.pool-card .pw-center { grid-column: 2; grid-row: 2; }

/* ── Sections ── */
.section-box { background:#fff; border-radius:12px; box-shadow:var(--shadow); padding:24px; margin-bottom:20px; }
.section-box h3 { font-size:1.1rem; margin-bottom:16px; color:var(--green); }

/* ── Score reveal ── */
.score-row { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid #eee; font-size:.95rem; }
.score-row:last-child { border-bottom:none; }
.score-pip { display:flex; gap:3px; }
.pip { width:14px;height:14px;border-radius:50%;background:#ddd; }
.pip.correct { background:var(--green-light); }

/* ── Correct arrangement ── */
.arrange-mini { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; max-width:240px; margin:0 auto; }
.am-cell { display:flex; align-items:center; justify-content:center; }
.am-card {
  background:var(--card-bg); border:2px solid var(--card-border); border-radius:6px;
  padding:6px 8px; text-align:center; font-size:.6rem; font-weight:700;
  text-transform:uppercase; line-height:1.4; display:grid;
  grid-template-rows:auto 1fr auto; grid-template-columns:auto 1fr auto;
  width:70px; height:65px;
}
.am-card .am-w {
  font-size:.5rem; text-align:center; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.am-card .am-n { grid-column:2; grid-row:1; }
.am-card .am-s { grid-column:2; grid-row:3; }
.am-card .am-w-l { grid-column:1; grid-row:2; align-self:center; }
.am-card .am-w-r { grid-column:3; grid-row:2; align-self:center; }
.am-card .am-c { grid-column:2; grid-row:2; font-size:.4rem; color:#aaa; }
.am-hint { font-size:.7rem; color:#888; }
.msg-success { color:var(--green); font-weight:600; font-size:.95rem; }
.msg-waiting { color:#aaa; font-size:.85rem; text-align:center; margin-top:12px; }
</style>

<script>
const ROOM_CODE = '{{ room_code }}';
const MY_ID = {{ player_id }};
const IS_HOST = {{ is_host|yesno:"true,false,false" }};

let lastState = null;
let pollTimer = null;

// ─────────── API helper ─────────────────────────────────────────────────────
async function apiPost(path, body) {
  const r = await fetch(path, {
    method: 'POST',
    headers: {'Content-Type':'application/json','X-CSRFToken':getCookie('csrftoken')},
    body: JSON.stringify(body),
  });
  return r.json();
}
function getCookie(name) {
  const v = document.cookie.match('(^|;) ?'+name+'=([^;]*)');
  return v ? v[2] : null;
}

function escapeHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─────────── Polling ────────────────────────────────────────────────────────
async function poll() {
  try {
    const r = await fetch(`/api/${ROOM_CODE}/state/`);
    const s = await r.json();
    lastState = s;
    render(s);
  } catch(e) { console.error(e); }
}

function startPolling() {
  poll();
  pollTimer = setInterval(poll, 2000);
}

// ─────────── Main render ────────────────────────────────────────────────────
function render(state) {
  document.getElementById('roomCode').textContent = ROOM_CODE;
  document.getElementById('playerName').textContent = state.players.find(p=>p.id===MY_ID)?.name || '';

  renderPlayerList(state);

  if (state.error) { renderError(state.error); return; }

  switch(state.phase) {
    case 'lobby':     renderLobby(state); break;
    case 'writing':   renderWriting(state); break;
    case 'guessing':  renderGuessing(state); break;
    case 'scoring':   renderScoring(state); break;
    case 'finished':  renderFinished(state); break;
  }
}

function renderPlayerList(state) {
  document.getElementById('playerList').innerHTML = state.players.map(p => `
    <div class="player-row">
      <span class="sp-dot ${p.clues_submitted||p.guess_submitted?'done':''}"></span>
      <span>${escapeHtml(p.name)}${p.id===MY_ID?' (you)':''}${p.is_host?' 👑':''}${p.is_visitor?' 👁':''}</span>
      <span class="sp-score">${p.score}</span>
    </div>
  `).join('');
}

function renderError(msg) {
  document.getElementById('mainArea').innerHTML = `<div class="section-box"><h3>Error</h3><p>${escapeHtml(msg)}</p></div>`;
}

// ─────────── Lobby ──────────────────────────────────────────────────────────
function renderLobby(state) {
  document.getElementById('phaseLabel').textContent = '🏠 Lobby';
  document.getElementById('sidebarExtra').innerHTML = '';

  const canStart = IS_HOST && state.players.length >= 2;
  document.getElementById('mainArea').innerHTML = `
    <div class="section-box">
      <h3>Waiting for players…</h3>
      <p style="color:#666;margin-bottom:16px;">Need at least 2 players. Share code: <strong>${ROOM_CODE}</strong></p>
      ${IS_HOST ? `<button class="btn btn-green" onclick="startGame()" ${canStart?'':'disabled'}>Start Game</button>` : '<p class="msg-waiting">Waiting for host to start…</p>'}
    </div>`;
}

async function startGame() {
  const d = await apiPost(`/api/${ROOM_CODE}/start/`, {});
  if (d.success) poll();
  else alert(d.error || 'Error');
}

// ─────────── Writing phase ──────────────────────────────────────────────────
function renderWriting(state) {
  const w = state.writing;
  if (!w) return;

  document.getElementById('phaseLabel').textContent = '✏️ Writing clues';
  if (w.error) { renderError(w.error); return; }

  // Visitors see a waiting message
  if (w.visitor) {
    document.getElementById('sidebarExtra').innerHTML = '';
    document.getElementById('mainArea').innerHTML = `
      <div class="section-box" style="text-align:center;padding:40px;">
        <div style="font-size:2rem;margin-bottom:12px;">🍀</div>
        <h3 style="color:var(--green);margin-bottom:8px;">You joined as a visitor</h3>
        <p style="color:#666;">Wait for players to finish writing their clues.<br>
        You'll be able to guess card positions once the guessing phase begins.</p>
      </div>`;
    return;
  }

  const sub = w.submitted;
  const done = state.players.filter(p=>p.clues_submitted).length;
  document.getElementById('sidebarExtra').innerHTML = `
    <div style="text-align:center;padding:8px;color:#666;font-size:.85rem;">
      ${done} / ${state.players.length} submitted
    </div>`;

  const arrangement = w.arrangement;
  const edges = w.edges;
  const clues = w.clues || {};

  document.getElementById('mainArea').innerHTML = `
    <div class="section-box">
      <h3>Your Clover 🍀</h3>
      <p style="color:#666;font-size:.9rem;margin-bottom:16px;">
        Write <strong>one word</strong> at each edge that hints at the <em>two words</em> shown there.
      </p>
      ${renderBoardWriting(arrangement, edges, clues, sub)}
      ${!sub ? `
        <div style="text-align:center;margin-top:20px;">
          <button class="btn btn-green" onclick="submitClues()">Submit Clues ✔</button>
        </div>` : `
        <div class="msg-success" style="margin-top:16px;text-align:center;">
          ✅ Clues submitted! Waiting for others…
        </div>`}
    </div>
  `;
}

function renderBoardWriting(arrangement, edges, clues, disabled) {
  const v = (edge, which) => edges[edge] ? edges[edge][which] : '?';
  const inp = (id, edgeKey, val) =>
    `<div class="clue-zone">
       <div class="clue-words">${escapeHtml(v(edgeKey,0))} · ${escapeHtml(v(edgeKey,1))}</div>
       <input id="${id}" type="text" maxlength="25"
              placeholder="your clue…"
              value="${escapeHtml(val)}"
              ${disabled?'disabled':''}>
     </div>`;

  function cardHTML(pos) {
    const c = arrangement[pos];
    const ws = c.words;
    return `<div class="board-card has-card">
      <div class="cw cw-n">${escapeHtml(ws[0])}</div>
      <div class="cw cw-e">${escapeHtml(ws[1])}</div>
      <div class="cw cw-s">${escapeHtml(ws[2])}</div>
      <div class="cw cw-w">${escapeHtml(ws[3])}</div>
      <div class="cw-center"><div class="cw-center-dot"></div></div>
    </div>`;
  }

  return `
    <div class="board-wrapper">
      <div class="board-grid">
        <!-- row 0 -->
        <div class="board-cell">${cardHTML('nw')}</div>
        <div class="board-cell">${inp('clue_n','n',clues.n)}</div>
        <div class="board-cell">${cardHTML('ne')}</div>
        <!-- row 1 -->
        <div class="board-cell">${inp('clue_w','w',clues.w)}</div>
        <div class="board-cell"><div class="board-center"><div class="board-center-dot"></div></div></div>
        <div class="board-cell">${inp('clue_e','e',clues.e)}</div>
        <!-- row 2 -->
        <div class="board-cell">${cardHTML('sw')}</div>
        <div class="board-cell">${inp('clue_s','s',clues.s)}</div>
        <div class="board-cell">${cardHTML('se')}</div>
      </div>
    </div>
  `;
}

async function submitClues() {
  const get = id => document.getElementById(id)?.value.trim() || '';
  const clues = {n: get('clue_n'), e: get('clue_e'), s: get('clue_s'), w: get('clue_w')};
  if (!clues.n||!clues.e||!clues.s||!clues.w) {
    alert('Please fill in all four clues.'); return;
  }

  const submitBtn = document.querySelector('.btn-green');
  if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'Submitting…'; }

  const d = await apiPost(`/api/${ROOM_CODE}/submit-clues/`, { clues });
  if (d.success) poll();
  else {
    alert(d.error || 'Error');
    if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = 'Submit Clues ✔'; }
  }
}

// ─────────── Guessing phase ─────────────────────────────────────────────────
// State: placed = {nw:{idx,flipped?}, ne:…, sw:…, se:…}
let placed = {nw:null,ne:null,sw:null,se:null};
let selectedCardIdx = null;
let placedDirty = false;

function renderGuessing(state) {
  const g = state.guessing;
  if (!g) return;

  document.getElementById('phaseLabel').textContent =
    `🔍 Guessing — ${g.owner_name}'s clover (${g.clover_index+1}/${g.total_clovers})`;

  document.getElementById('sidebarExtra').innerHTML = `
    <div style="background:#fff;border-radius:8px;padding:12px 14px;box-shadow:var(--shadow);">
      <div style="font-size:.8rem;color:#888;margin-bottom:4px;">Submitted</div>
      <div style="font-weight:700;font-size:1.1rem;">${g.submitted_count} / ${g.total_guessers}</div>
    </div>`;

  if (g.my_guess && !placedDirty) {
    // Restore previous guess
    for (const [k,v] of Object.entries(g.my_guess)) {
      if (v && v.idx !== undefined) placed[k] = {idx: v.idx, flipped: v.flipped || false};
    }
  }

  if (g.all_submitted) {
    renderWaitingAfterGuess(g);
    return;
  }

  renderGuesserBoard(g);
}

function renderWaitingAfterGuess(g) {
  document.getElementById('mainArea').innerHTML = `
    <div class="section-box">
      <h3>Guess submitted! ✅</h3>
      <p style="color:#666;">Waiting for others… <strong>${g.submitted_count}</strong> / <strong>${g.total_guessers}</strong> done.</p>
    </div>
  `;
}

function getCardByIdx(cards, idx) {
  return cards.find(c=>c.idx===idx) || null;
}

function cardWord(cardEntry, direction, flipped) {
  if (!cardEntry) return '?';
  const idx = {n:0, e:1, s:2, w:3}[direction];
  const actualIdx = flipped ? (idx + 2) % 4 : idx;
  return cardEntry.words[actualIdx];
}

function derivedEdge(cards, pos1, dir1, pos2, dir2) {
  const p1 = placed[pos1];
  const p2 = placed[pos2];
  if (!p1 || !p2) return ['?','?'];
  const c1 = getCardByIdx(cards, p1.idx);
  const c2 = getCardByIdx(cards, p2.idx);
  return [cardWord(c1, dir1, p1.flipped), cardWord(c2, dir2, p2.flipped)];
}

function renderGuesserBoard(g) {
  const cards = g.cards;
  const clues = g.clues;
  const placedIndices = new Set(Object.values(placed).filter(Boolean).map(p=>p.idx));

  const edgeN = derivedEdge(cards,'nw','n','ne','n');
  const edgeE = derivedEdge(cards,'ne','e','se','e');
  const edgeS = derivedEdge(cards,'sw','s','se','s');
  const edgeW = derivedEdge(cards,'nw','w','sw','w');

  function slotHTML(pos) {
    const p = placed[pos];
    if (!p) {
      return `<div class="board-card drop-target" onclick="placeCard('${pos}')">
        <div class="cw" style="color:#bbb;font-size:.55rem;grid-column:2;grid-row:2;">Click to place</div>
      </div>`;
    }
    const card = getCardByIdx(cards, p.idx);
    const word = (d) => cardWord(card, d, p.flipped);
    return `<div class="board-card has-card">
      <div class="cw cw-n">${escapeHtml(word('n'))}</div>
      <div class="cw cw-e">${escapeHtml(word('e'))}</div>
      <div class="cw cw-s">${escapeHtml(word('s'))}</div>
      <div class="cw cw-w">${escapeHtml(word('w'))}</div>
      <div class="cw-center"><div class="cw-center-dot"></div></div>
      <div class="card-controls">
        <button class="card-btn" onclick="removeCard('${pos}')">✕</button>
        <button class="card-btn flip" onclick="flipCard('${pos}')">⇄</button>
      </div>
    </div>`;
  }

  function clueHTML(dir, clue, w) {
    const match = w[0]!=='?' && w[1]!=='?';
    return `<div class="clue-zone" style="${match?'':'opacity:.6'}">
      <div class="clue-display">${escapeHtml(clue)}</div>
      <div class="clue-words">${escapeHtml(w[0])} · ${escapeHtml(w[1])}</div>
    </div>`;
  }

  const allPlaced = Object.values(placed).every(Boolean);

  document.getElementById('mainArea').innerHTML = `
    <div class="section-box">
      <h3>Reconstruct ${escapeHtml(g.owner_name)}'s clover</h3>
      <p style="font-size:.85rem;color:#666;margin-bottom:12px;">
        Select a card from the pool, then click a slot to place it.
        Use ⇄ to rotate a card 180°.
      </p>
      <!-- card pool -->
      <div class="card-pool" id="cardPool">
        ${cards.map(c => {
          const isPlaced = placedIndices.has(c.idx);
          const isSel = selectedCardIdx===c.idx;
          return `<div class="pool-card ${isPlaced?'placed':''} ${isSel&&!isPlaced?'selected':''}"
                       id="pool-card-${c.idx}"
                       onclick="${isPlaced?'':'selectCard('+c.idx+')'}">
            <div class="pw pw-n">${escapeHtml(c.words[0])}</div>
            <div class="pw pw-e">${escapeHtml(c.words[1])}</div>
            <div class="pw pw-s">${escapeHtml(c.words[2])}</div>
            <div class="pw pw-w">${escapeHtml(c.words[3])}</div>
            <div class="pw pw-center"></div>
          </div>`;
        }).join('')}
      </div>

      <!-- board -->
      <div class="board-wrapper">
        <div class="board-grid">
          <!-- row 0 -->
          <div class="board-cell">${slotHTML('nw')}</div>
          <div class="board-cell">${clueHTML('n', clues.n||'?', edgeN)}</div>
          <div class="board-cell">${slotHTML('ne')}</div>
          <!-- row 1 -->
          <div class="board-cell">${clueHTML('w', clues.w||'?', edgeW)}</div>
          <div class="board-cell"><div class="board-center"><div class="board-center-dot"></div></div></div>
          <div class="board-cell">${clueHTML('e', clues.e||'?', edgeE)}</div>
          <!-- row 2 -->
          <div class="board-cell">${slotHTML('sw')}</div>
          <div class="board-cell">${clueHTML('s', clues.s||'?', edgeS)}</div>
          <div class="board-cell">${slotHTML('se')}</div>
        </div>
      </div>

      <div style="text-align:center;margin-top:20px;">
        <button class="btn btn-green" onclick="submitGuess()" ${allPlaced?'':'disabled'}>
          Submit Guess ✔
        </button>
        ${!allPlaced ? '<p style="color:#aaa;font-size:.8rem;margin-top:6px;">Place all 4 cards to submit</p>' : ''}
      </div>
    </div>
  `;
}

function selectCard(idx) {
  selectedCardIdx = (selectedCardIdx===idx) ? null : idx;
  const g = lastState?.guessing;
  if (g) renderGuesserBoard(g);
}

function placeCard(pos) {
  if (selectedCardIdx===null) return;
  placedDirty = true;
  for (const [k,v] of Object.entries(placed)) {
    if (v && v.idx===selectedCardIdx) { placed[k]=null; break; }
  }
  placed[pos] = {idx: selectedCardIdx, flipped: false};
  selectedCardIdx = null;
  const g = lastState?.guessing;
  if (g) renderGuesserBoard(g);
}

function removeCard(pos) {
  placedDirty = true;
  placed[pos] = null;
  const g = lastState?.guessing;
  if (g) renderGuesserBoard(g);
}

function flipCard(pos) {
  if (placed[pos]) {
    placedDirty = true;
    placed[pos].flipped = !placed[pos].flipped;
    const g = lastState?.guessing;
    if (g) renderGuesserBoard(g);
  }
}

async function submitGuess() {
  const arrangement = {};
  for (const [k,v] of Object.entries(placed)) {
    if (v) arrangement[k] = {idx: v.idx, flipped: v.flipped};
  }

  const submitBtn = document.querySelector('.btn-green');
  if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'Submitting…'; }

  const d = await apiPost(`/api/${ROOM_CODE}/submit-guess/`, {
    arrangement,
    clover_index: lastState.guessing.clover_index,
  });
  if (d.success) {
    alert(`You got ${d.score}/4 correct! 🎉`);
    placed = {nw:null,ne:null,sw:null,se:null};
    placedDirty = false;
    selectedCardIdx = null;
    poll();
  } else {
    alert(d.error || 'Error');
    if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = 'Submit Guess ✔'; }
  }
}

// ─────────── Scoring phase ──────────────────────────────────────────────────
function renderScoring(state) {
  const g  = state.guessing;
  const sc = state.scoring;
  document.getElementById('phaseLabel').textContent = `📊 Results — ${g.owner_name}'s clover`;
  document.getElementById('sidebarExtra').innerHTML = '';

  const arr   = sc.correct_arrangement;
  const edges = sc.correct_edges;
  const clues = g.clues;

  function miniCard(pos) {
    const c = arr[pos];
    const ws = c.words;
    const flipped = c.flipped;
    const word = (d) => {
      const idx = {n:0,e:1,s:2,w:3}[d];
      return ws[flipped ? (idx+2)%4 : idx];
    };
    return `<div class="am-card">
      <div class="am-w am-n">${escapeHtml(word('n'))}</div>
      <div class="am-w am-w-r">${escapeHtml(word('e'))}</div>
      <div class="am-w am-s">${escapeHtml(word('s'))}</div>
      <div class="am-w am-w-l">${escapeHtml(word('w'))}</div>
      <div class="am-c">·</div>
    </div>`;
  }

  document.getElementById('mainArea').innerHTML = `
    <div class="section-box">
      <h3>Results for ${escapeHtml(g.owner_name)}'s Clover 🍀</h3>

      <div style="display:flex;gap:24px;flex-wrap:wrap;margin-bottom:24px;">
        <!-- correct arrangement -->
        <div style="flex:1;min-width:200px;">
          <div style="font-size:.85rem;color:#888;margin-bottom:8px;font-weight:600;">CORRECT ARRANGEMENT</div>
          <div class="arrange-mini">
            <div class="am-cell"></div>
            <div class="am-cell">${miniCard('nw')}</div>
            <div class="am-cell"></div>

            <div class="am-cell">${miniCard('sw')}</div>
            <div class="am-cell"><div class="board-center-dot"></div></div>
            <div class="am-cell">${miniCard('se')}</div>

            <div class="am-cell"></div>
            <div class="am-cell">${miniCard('ne')}</div>
            <div class="am-cell"></div>
          </div>
        </div>

        <!-- clues + correct word pairs -->
        <div style="flex:1;min-width:200px;">
          <div style="font-size:.85rem;color:#888;margin-bottom:8px;font-weight:600;">CLUES</div>
          ${['n','e','s','w'].map(e=>`
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
              <span style="background:var(--hint-bg);border:1px solid var(--hint-border);border-radius:6px;padding:3px 10px;font-weight:700;font-size:.8rem;text-transform:uppercase;min-width:50px;text-align:center;">${escapeHtml(clues[e]||'?')}</span>
              <span style="font-size:.8rem;color:#888">${edges[e]?edges[e].map(w=>escapeHtml(w)).join(' · '):'?'}</span>
            </div>
          `).join('')}
        </div>
      </div>

      <!-- guesses -->
      <div style="font-size:.85rem;color:#888;margin-bottom:8px;font-weight:600;">PLAYER SCORES</div>
      ${sc.all_guesses.map(g=>`
        <div class="score-row">
          <div style="font-weight:600;flex:1">${escapeHtml(g.guesser_name)}${g.guesser_id===MY_ID?' (you)':''}</div>
          <div class="score-pip">${pips(g.score)}</div>
          <div style="font-weight:800;font-size:1.1rem;color:var(--green);min-width:40px;text-align:right">${g.score}/4</div>
        </div>
      `).join('')}

      ${IS_HOST ? `
        <div style="text-align:center;margin-top:24px;">
          <button class="btn btn-gold" onclick="nextClover()">
            ${g.clover_index+1 < g.total_clovers ? 'Next Clover →' : '🏆 Show Final Scores'}
          </button>
        </div>` : `
        <div class="msg-waiting">Waiting for host to continue…</div>`
      }
    </div>
  `;
}

function pips(score) {
  return [0,1,2,3,4].map(i => `<span class="pip ${i<score?'correct':''}"></span>`).join('');
}

async function nextClover() {
  const d = await apiPost(`/api/${ROOM_CODE}/next-clover/`, {});
  if (d.success) poll();
  else alert(d.error || 'Error');
}

// ─────────── Finished ───────────────────────────────────────────────────────
function renderFinished(state) {
  document.getElementById('phaseLabel').textContent = '🏆 Game Over';
  document.getElementById('sidebarExtra').innerHTML = '';

  const scores = state.final_scores;
  const maxScore = scores.length > 0 ? scores[0].score : 0;

  document.getElementById('mainArea').innerHTML = `
    <div class="section-box">
      <h3>Final Scores 🏆</h3>
      ${scores.map((s,i) => `
        <div class="score-row" style="${s.id===MY_ID?'background:#f1f8e9;border-radius:8px;padding:10px 12px;':''}">
          <div style="font-weight:700;font-size:1.1rem;min-width:30px;color:#888;">#${i+1}</div>
          <div style="font-weight:600;flex:1;font-size:1.05rem;">${escapeHtml(s.name)}${s.id===MY_ID?' (you)':''}</div>
          <div style="font-weight:800;font-size:1.3rem;color:var(--green);">${s.score}</div>
        </div>
      `).join('')}

      ${IS_HOST ? `
        <div style="text-align:center;margin-top:24px;">
          <button class="btn btn-gold" onclick="window.location.reload()">🔄 New Game</button>
        </div>` : `
        <div class="msg-waiting">Waiting for host to start a new game…</div>`
      }
    </div>
  `;
}

// ─────────── Kick ───────────────────────────────────────────────────────────
async function kickPlayer(id) {
  if (!confirm('Kick this player?')) return;
  const d = await apiPost(`/api/${ROOM_CODE}/kick/`, {player_id: id});
  if (!d.success) alert(d.error || 'Error');
  else poll();
}

// ─────────── Init ───────────────────────────────────────────────────────────
startPolling();
</script>
{% endblock %}
